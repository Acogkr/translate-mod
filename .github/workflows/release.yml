name: Build and Release Mod Jar

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 8.14.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.1

      - name: Read release metadata
        id: metadata
        shell: bash
        run: |
          echo "mod_version=$(grep '^mod_version=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "loader_version=$(grep '^loader_version=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "fabric_version=$(grep '^fabric_version=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Build mod jar
        run: gradle build remapJar --no-daemon

      - name: Collect release jar
        run: |
          mkdir -p dist
          find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' -exec cp {} dist/ \;
          ls -al dist

      - name: Publish tagged release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ steps.metadata.outputs.mod_version }} - Minecraft ${{ steps.metadata.outputs.minecraft_version }}
          body: |
            - mod_version: `${{ steps.metadata.outputs.mod_version }}`
            - minecraft_version: `${{ steps.metadata.outputs.minecraft_version }}`
            - loader_version: `${{ steps.metadata.outputs.loader_version }}`
            - fabric_version: `${{ steps.metadata.outputs.fabric_version }}`
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: dist/*
